services:
  cassandra:
    build:
      context: .
      dockerfile: Dockerfile.cassandra
    container_name: encurtador-cassandra
    ports:
      - "9042:9042"
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces", "localhost", "9042"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: encurtador-backend
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=Encurtador de URL
      - API_BASE_URL=http://localhost:8000
      - JWT_SECRET=troque-este-segredo
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRES_MINUTES=10080
      - CASSANDRA_HOSTS=cassandra
      - CASSANDRA_PORT=9042
      - CASSANDRA_KEYSPACE=url_shortener
      - CASSANDRA_DATACENTER=datacenter1
    depends_on:
      cassandra:
        condition: service_healthy
    restart: always

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: encurtador-web
    ports:
      - "4200:4200"
    volumes:
      - ./web:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: always

